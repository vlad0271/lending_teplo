<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if success %}Оплата прошла успешно{% else %}Оплата не завершена{% endif %} — Теплоконтроль</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    .result-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      padding: 2rem;
    }
    .result-card {
      background: #1e293b;
      border-radius: 1rem;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .result-icon {
      font-size: 4rem;
      margin-bottom: 1.25rem;
      line-height: 1;
    }
    .result-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 1rem;
    }
    .result-message {
      color: #94a3b8;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .result-btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
      background: #f97316;
      color: #fff;
    }
    .result-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
<div class="result-page">
  <div class="result-card">
    <div class="result-icon">{% if success %}✅{% else %}❌{% endif %}</div>
    <h1 class="result-title">
      {% if success %}Оплата прошла успешно!{% else %}Оплата не завершена{% endif %}
    </h1>
    <p class="result-message">{{ message }}</p>
    <a href="/" class="result-btn">Вернуться на сайт</a>
  </div>
</div>
</body>
</html>
